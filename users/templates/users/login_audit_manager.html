{% extends "common/base.html" %}
{% block title %}Acceso Socios{% endblock %}
{% block content %}
<main class="d-flex justify-content-center align-items-center min-vh-100 w-100 bg-light" style="margin: 0 auto;">
  <div class="card shadow-sm border-0" style="max-width: 420px; width:100%;">
    <div class="card-body p-4">
      <h3 class="text-center mb-3">Acceso para Socios</h3>

      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }} mb-2">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" name="email" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button class="btn btn-primary w-100" type="submit">Ingresar</button>
      </form>

      <div class="text-center mt-3">
        <a href="{% url 'login' %}" class="small text-muted">Volver al inicio de sesión normal</a>
      </div>
    </div>
  </div>
</main>
{% endblock %}
